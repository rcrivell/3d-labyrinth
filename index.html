<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Population Treemap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: sans-serif; }
  h1 { text-align: center; padding: 16px 0 4px; font-size: 22px; font-weight: 300; letter-spacing: 2px; }
  p.sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 12px; }
  #chart { width: 100vw; height: calc(100vh - 80px); }
  .cell rect { stroke: #111; stroke-width: 1.5; cursor: pointer; transition: opacity 0.15s; }
  .cell rect:hover { opacity: 0.8; }
  .cell text { pointer-events: none; fill: #fff; text-shadow: 0 1px 3px #000; }
  .label-country { font-size: 13px; font-weight: 600; }
  .label-pop { font-size: 11px; fill: rgba(255,255,255,0.75); }
  #tooltip {
    position: fixed; background: rgba(0,0,0,0.85); border: 1px solid #444;
    padding: 10px 14px; border-radius: 6px; font-size: 13px; pointer-events: none;
    display: none; max-width: 220px; line-height: 1.6;
  }
  #tooltip strong { font-size: 15px; }
  .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 6px 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ccc; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>
<h1>WORLD POPULATION TREEMAP</h1>
<p class="sub">2024 estimates — area proportional to population</p>
<div id="legend" class="legend"></div>
<svg id="chart"></svg>
<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>

      { name: "Tajikistan", pop: 10, continent: "Asia" },
      { name: "Israel", pop: 10, continent: "Asia" },
    ]},
    { name: "Africa", children: [
      { name: "Nigeria", pop: 229, continent: "Africa" },
      { name: "Ethiopia", pop: 128, continent: "Africa" },
      { name: "Egypt", pop: 106, continent: "Africa" },
      { name: "DR Congo", pop: 102, continent: "Africa" },

      { name: "Algeria", pop: 46, continent: "Africa" },
      { name: "Sudan", pop: 46, continent: "Africa" },
      { name: "Morocco", pop: 38, continent: "Africa" },
      { name: "Ghana", pop: 34, continent: "Africa" },
      { name: "Mozambique", pop: 33, continent: "Africa" },
      { name: "Angola", pop: 36, continent: "Africa" },
      { name: "Madagascar", pop: 29, continent: "Africa" },
      { name: "Cameroon", pop: 28, continent: "Africa" },
      { name: "Ivory Coast", pop: 27, continent: "Africa" },

    ]},
    { name: "Europe", children: [

      { name: "Ukraine", pop: 43, continent: "Europe" },
      { name: "Poland", pop: 41, continent: "Europe" },
      { name: "Romania", pop: 19, continent: "Europe" },
      { name: "Netherlands", pop: 18, continent: "Europe" },

    { name: "Americas", children: [
      { name: "USA", pop: 341, continent: "Americas" },

      { name: "Bolivia", pop: 13, continent: "Americas" },
      { name: "Haiti", pop: 12, continent: "Americas" },
      { name: "Dominican Rep.", pop: 11, continent: "Americas" },
      { name: "Honduras", pop: 11, continent: "Americas" },
      { name: "Paraguay", pop: 7, continent: "Americas" },
      { name: "El Salvador", pop: 6, continent: "Americas" },
      { name: "Nicaragua", pop: 7, continent: "Americas" },
    ]},
    { name: "Oceania", children: [
      { name: "Australia", pop: 27, continent: "Oceania" },
      { name: "Papua New Guinea", pop: 10, continent: "Oceania" },
      { name: "New Zealand", pop: 5, continent: "Oceania" },
      { name: "Fiji", pop: 1, continent: "Oceania" },
    ]},
  ]
};

const continentColors = {
  "Asia":     "#e07b39",
  "Africa":   "#4caf7d",
  "Europe":   "#5b8dd9",
  "Americas": "#c84b6e",
  "Oceania":  "#a259c4",
};

function fmtPop(m) {
  if (m >= 1000) return (m/1000).toFixed(2) + "B";
  if (m >= 1)    return m.toFixed(1) + "M";
  return (m * 1000).toFixed(0) + "K";
}

const svg = d3.select("#chart");
const tooltip = document.getElementById("tooltip");

function render() {
  svg.selectAll("*").remove();
  const W = window.innerWidth, H = window.innerHeight - 80 - document.getElementById("legend").offsetHeight;
  svg.attr("width", W).attr("height", H);

  const root = d3.hierarchy(data)
    .sum(d => d.pop)
    .sort((a, b) => b.value - a.value);

  d3.treemap().size([W, H]).paddingOuter(4).paddingInner(2).paddingTop(0).round(true)(root);

  const cells = svg.selectAll("g")
    .data(root.leaves())
    .join("g")
    .attr("class", "cell")
    .attr("transform", d => `translate(${d.x0},${d.y0})`);

  cells.append("rect")
    .attr("width",  d => d.x1 - d.x0)
    .attr("height", d => d.y1 - d.y0)
    .attr("fill", d => {
      const color = d3.color(continentColors[d.data.continent] || "#888");
      const t = Math.log(d.data.pop + 1) / Math.log(1500);
      return d3.interpolate(color.darker(1.2), color.brighter(0.3))(t);
    });

  cells.each(function(d) {
    const w = d.x1 - d.x0, h = d.y1 - d.y0;
    const g = d3.select(this);
    if (w > 40 && h > 24) {
      g.append("text")
        .attr("class", "label-country")
        .attr("x", w / 2).attr("y", h / 2 - (h > 40 ? 6 : 0))
        .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
        .style("font-size", Math.min(13, w / 6) + "px")
        .text(d.data.name);
      if (h > 40) {
        g.append("text")
          .attr("class", "label-pop")
          .attr("x", w / 2).attr("y", h / 2 + 10)
          .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
          .style("font-size", Math.min(11, w / 8) + "px")
          .text(fmtPop(d.data.pop));
      }
    }
  });

  cells
    .on("mousemove", (e, d) => {
      tooltip.style.display = "block";
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top  = (e.clientY - 10) + "px";
      tooltip.innerHTML = `<strong>${d.data.name}</strong><br>
        Continent: ${d.data.continent}<br>
        Population: <b>${fmtPop(d.data.pop)}</b><br>
        Share of world: <b>${(d.value / root.value * 100).toFixed(2)}%</b>`;
    })
    .on("mouseleave", () => tooltip.style.display = "none");
}

// Legend
const legendEl = document.getElementById("legend");
Object.entries(continentColors).forEach(([name, color]) => {
  legendEl.innerHTML += `<div class="legend-item">
    <div class="legend-dot" style="background:${color}"></div>${name}
  </div>`;
});

render();
window.addEventListener("resize", render);
</script>
</body>
</html>
